<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>手机端测试预览</title>
    <style>
      :root {
        --bg: #0b1220;
        --panel: rgba(255, 255, 255, 0.06);
        --text: rgba(255, 255, 255, 0.9);
        --muted: rgba(255, 255, 255, 0.6);
        --border: rgba(255, 255, 255, 0.12);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        background: radial-gradient(1200px 800px at 20% 10%, rgba(59, 130, 246, 0.26), transparent 60%),
          radial-gradient(900px 700px at 80% 20%, rgba(16, 185, 129, 0.20), transparent 60%),
          var(--bg);
        color: var(--text);
      }
      .wrap {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }
      header {
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.22);
        backdrop-filter: blur(10px);
      }
      .title {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .title h1 {
        margin: 0;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.2px;
      }
      .title p {
        margin: 0;
        font-size: 12px;
        color: var(--muted);
      }
      .controls {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      select,
      a.button {
        height: 34px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        padding: 0 10px;
        font-size: 12px;
        outline: none;
      }
      a.button {
        display: inline-flex;
        align-items: center;
        text-decoration: none;
        user-select: none;
      }
      main {
        display: grid;
        place-items: center;
        padding: 18px 16px 26px;
      }
      .device {
        width: calc(var(--w) * 1px);
        height: calc(var(--h) * 1px);
        border-radius: 34px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.04);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.55);
        position: relative;
        padding: 16px;
      }
      .screen {
        width: 100%;
        height: 100%;
        border-radius: 22px;
        overflow: hidden;
        background: #fff;
      }
      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
        background: #fff;
      }
      .hint {
        margin-top: 12px;
        font-size: 12px;
        color: var(--muted);
        text-align: center;
        max-width: 520px;
        line-height: 1.6;
      }
      .bar {
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        width: 120px;
        height: 18px;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.18);
        border: 1px solid rgba(255, 255, 255, 0.16);
        display: grid;
        place-items: center;
        font-size: 10px;
        color: rgba(255, 255, 255, 0.75);
        pointer-events: none;
      }
      @media (max-width: 540px) {
        .device {
          transform: scale(0.9);
          transform-origin: top center;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div class="title">
          <h1>手机端测试预览</h1>
          <p>在桌面端模拟手机尺寸，便于验收页面适配与交互</p>
        </div>
        <div class="controls">
          <select id="preset" aria-label="设备预设">
            <option value="iphone12">iPhone 12 (390×844)</option>
            <option value="iphoneSE">iPhone SE (375×667)</option>
            <option value="pixel5">Pixel 5 (393×851)</option>
            <option value="androidSmall">Android 小屏 (360×740)</option>
          </select>
          <a class="button" href="/" target="_blank" rel="noreferrer">打开原站</a>
        </div>
      </header>
      <main>
        <div class="device" id="device" style="--w: 390; --h: 844;">
          <div class="bar" id="bar">390×844</div>
          <div class="screen">
            <iframe id="app" src="/" title="App" allow="camera; microphone; clipboard-read; clipboard-write;"></iframe>
          </div>
        </div>
        <div class="hint">
          若需要在真机上测试相机/文件选择，请用同一 Wi‑Fi 的手机访问开发机的 Network 地址（终端里有显示），并在手机浏览器授权相机权限。
        </div>
      </main>
    </div>
    <script>
      const presets = {
        iphone12: { w: 390, h: 844 },
        iphoneSE: { w: 375, h: 667 },
        pixel5: { w: 393, h: 851 },
        androidSmall: { w: 360, h: 740 }
      }
      const deviceEl = document.getElementById('device')
      const barEl = document.getElementById('bar')
      const presetEl = document.getElementById('preset')
      const applyPreset = (key) => {
        const p = presets[key] || presets.iphone12
        deviceEl.style.setProperty('--w', String(p.w))
        deviceEl.style.setProperty('--h', String(p.h))
        barEl.textContent = `${p.w}×${p.h}`
      }
      presetEl.addEventListener('change', (e) => applyPreset(e.target.value))
      applyPreset(presetEl.value)
    </script>
  </body>
</html>
